name: Live DNS smoke test

on:
  workflow_dispatch:
  schedule:
    - cron: "23 4 * * 2"

jobs:
  live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run start > /tmp/dns-tools.log 2>&1 &
      - run: for attempt in {1..30}; do curl -fsS http://127.0.0.1:1273/api/health && exit 0; sleep 1; done; cat /tmp/dns-tools.log; exit 1
      - run: npm run test:live
